name: pokemons
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  dio: ^5.9.1
  # Riverpod 3 + anotaciones para codegen
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2
  # Modelos inmutables (entidades, DTOs)
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  flutter_svg: ^2.0.16
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Generación de código (freezed + riverpod_generator)
  build_runner: ^2.11.1
  freezed: ^3.2.5
  json_serializable: ^6.9.2
  riverpod_generator: ^4.0.3

# Necesario con Dart 3.9 / Flutter actual: el SDK fija test_api 0.7.6 y choca con
# analyzer 9+ (freezed 3 / build_runner 2.10.5+). Este override permite el stack actual.
# Si los tests fallan, quitar el override y usar el stack 2.x (ver README).
dependency_overrides:
  test_api: 0.7.10
  matcher: 0.12.19

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/svg/
    # Imágenes base (Flutter carga automáticamente 2.0x y 3.0x)
    - assets/images/Omboarding_01.png
    - assets/images/Omboarding_02.png
